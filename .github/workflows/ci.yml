name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/omar229001/valoria

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/api-gateway:latest

      - name: Build user-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/user-service:latest

      - name: Build scraper-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/scraper-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/scraper-service:latest

      - name: Build pricing-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/pricing-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/pricing-service:latest

      - name: Build cotation-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/cotation-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/cotation-service:latest

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.IMAGE_PREFIX }}/frontend:latest