name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --namespace=valoria-prod \
            --docker-server=ghcr.io \
            --docker-username=omar229001 \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create app secrets
        run: |
          kubectl create secret generic valoria-secrets \
            --namespace=valoria-prod \
            --from-literal=postgres-password=valoria_prod \
            --from-literal=rabbitmq-password=valoria_prod \
            --from-literal=jwt-secret=change_me_in_prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure
        run: |
          kubectl apply -f infra/k8s/prod/postgres.yml
          kubectl apply -f infra/k8s/prod/redis.yml
          kubectl apply -f infra/k8s/prod/rabbitmq.yml

      - name: Deploy services
        run: |
          kubectl apply -f infra/k8s/prod/api-gateway.yml
          kubectl apply -f infra/k8s/prod/user-service.yml
          kubectl apply -f infra/k8s/prod/scraper-service.yml
          kubectl apply -f infra/k8s/prod/pricing-service.yml
          kubectl apply -f infra/k8s/prod/cotation-service.yml
          kubectl apply -f infra/k8s/prod/frontend.yml
          kubectl apply -f infra/k8s/prod/ingress.yml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n valoria-prod --timeout=120s
          kubectl rollout status deployment/frontend -n valoria-prod --timeout=120s
