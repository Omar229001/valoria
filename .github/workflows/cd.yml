name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy infrastructure
        run: |
          kubectl apply -f infra/k8s/prod/secrets.yml
          kubectl apply -f infra/k8s/prod/postgres.yml
          kubectl apply -f infra/k8s/prod/redis.yml
          kubectl apply -f infra/k8s/prod/rabbitmq.yml

      - name: Deploy services
        run: |
          kubectl apply -f infra/k8s/prod/api-gateway.yml
          kubectl apply -f infra/k8s/prod/user-service.yml
          kubectl apply -f infra/k8s/prod/scraper-service.yml
          kubectl apply -f infra/k8s/prod/pricing-service.yml
          kubectl apply -f infra/k8s/prod/cotation-service.yml
          kubectl apply -f infra/k8s/prod/frontend.yml
          kubectl apply -f infra/k8s/prod/ingress.yml

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n valoria-prod
          kubectl rollout status deployment/frontend -n valoria-prod