apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: valoria-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/omar229001/valoria/user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              value: "postgresql://valoria:$(POSTGRES_PASSWORD)@postgres:5432/valoria"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valoria-secrets
                  key: postgres-password
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: valoria-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: valoria-prod
spec:
  selector:
    app: user-service
  ports:
    - port: 8081
      targetPort: 8081
