apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: valoria-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/omar229001/valoria/frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: valoria-prod
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
