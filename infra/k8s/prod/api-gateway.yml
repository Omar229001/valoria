apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: valoria-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api-gateway
          image: ghcr.io/omar229001/valoria/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: RUST_LOG
              value: "info"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: COTATION_SERVICE_URL
              value: "http://cotation-service:8082"
            - name: PRICING_SERVICE_URL
              value: "http://pricing-service:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: valoria-prod
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
